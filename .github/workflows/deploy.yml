name: SecureTrace CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Job 1: Build and Test ──────────────────────────────────────────────────
  # Runs on every push and pull request.
  # If tests fail, the deploy job will NOT run.
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore code/SecureTrace.API/SecureTrace.API.csproj

      - name: Build
        run: dotnet build code/SecureTrace.API/SecureTrace.API.csproj --no-restore --configuration Release

      - name: Run tests
        run: dotnet test code/SecureTrace.Tests/SecureTrace.Tests.csproj --no-restore --verbosity normal

  # ── Job 2: Deploy to Azure ─────────────────────────────────────────────────
  # Only runs on pushes to main (not pull requests).
  # Only runs if build-and-test passes.
  # This job will be SKIPPED until you add the AZURE_WEBAPP_PUBLISH_PROFILE
  # secret to your GitHub repository settings.
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish API
        run: dotnet publish code/SecureTrace.API/SecureTrace.API.csproj \
          --configuration Release \
          --output ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'securetrace-api'         # ← change this to your Azure App Service name when you create it
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
